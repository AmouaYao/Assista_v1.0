{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Jardin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f7f3ec;
            --forest: #2c4a35;
            --forest-light: #3d6648;
            --gold: #b8935a;
            --gold-light: #d4af7a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Jost", sans-serif;
            background: var(--cream);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 1s ease-in-out;
            transition: opacity 0.8s ease-out;
        }

        .splash-container.fade-out {
            opacity: 0;
            transform: scale(0.95);
        }

        .logo-container {
            margin-bottom: 30px;
            animation: scaleIn 1.5s ease-in-out;
        }


     

        .logo {
            width: 160px;
            height: 160px;
            border-radius: 24px;
            position: relative;
            z-index: 1;
        }


        .brand-name {
            font-family: "Cormorant Garamond", serif;
            font-size: 36px;
            font-weight: 400;
            color: var(--forest);
            letter-spacing: 0.06em;
            margin-bottom: 10px;
            animation: slideUp 1.2s ease-in-out 0.5s both;
        }

        .brand-tagline {
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 300;
            animation: slideUp 1.2s ease-in-out 0.7s both;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
            animation: slideUp 1.2s ease-in-out 0.9s both;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 80%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            40% {
                transform: scale(1.3);
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-container">
            <div class="logo-circle">
                <img class="logo" src="{% static 'assets/images/assista.png' %}" alt="Le Jardin Logo">
            </div>
        </div>
        
        <h1 class="brand-name">E-Menus</h1>
        <p class="brand-tagline">Restaurant Le Shawarma +</p>
        
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Transition fluide après 3 secondes
        setTimeout(function() {
            const splashContainer = document.querySelector('.splash-container');
            splashContainer.classList.add('fade-out');
            
            // Redirection après l'animation de fade-out
            setTimeout(function() {
                window.location.href = '/menu/';
            }, 800);
        }, 3000);
    </script>
</body>
</html>
