{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>E-Menus - Restaurants</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/css/styles.css' %}">
    <style>
        .restaurants-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .search-section {
            background: var(--cream);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--gold);
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: white;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
        }
        
        .restaurants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        
        .restaurant-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        
        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        .restaurant-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--cream);
        }
        
        .restaurant-content {
            padding: 20px;
        }
        
        .restaurant-name {
            font-size: 24px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            font-family: 'Inter', sans-serif;
        }
        
        .restaurant-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            font-size: 14px;
        }
        
        .info-icon {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }
        
        .restaurant-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.3s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-secondary {
            background: var(--cream);
            color: var(--dark);
            border: 1px solid var(--gold);
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-secondary:hover {
            background: var(--gold);
            color: white;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
            font-size: 18px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: var(--primary);
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        
        .header p {
            color: var(--gray);
            font-size: 16px;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }
        
        @media (max-width: 768px) {
            .restaurants-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .search-section {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="restaurants-container">
        <div class="header">
            <h1>E-Menus</h1>
            <p>Choisissez votre restaurant pour commander</p>
        </div>
        
        <div class="search-section">
            <input 
                type="text" 
                class="search-input" 
                placeholder="🔍 Rechercher un restaurant..."
                id="searchInput"
                onkeyup="searchRestaurants()"
            />
        </div>
        
        <div id="restaurantsList" class="restaurants-grid">
            <!-- Les restaurants seront chargés ici par JavaScript -->
        </div>
        
        <div id="noResults" class="no-results" style="display: none;">
            <div>🍽</div>
            <div>Aucun restaurant trouvé</div>
            <div>Essayez avec d'autres mots-clés</div>
        </div>
    </div>

    <script>
        let restaurants = [];
        
        function renderRestaurant(restaurant) {
            return `
                <div class="restaurant-card" onclick="selectRestaurant('${restaurant.id}')">
                    ${restaurant.logo ? 
                        `<img src="${restaurant.logo}" class="restaurant-image" alt="${restaurant.nom}">` : 
                        `<div class="restaurant-image"></div>`
                    }
                    <div class="restaurant-content">
                        <h3 class="restaurant-name">${restaurant.nom}</h3>
                        <div class="restaurant-info">
                            <div class="info-item">
                                <span class="info-icon">📍</span>
                                <span>${restaurant.adresse}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-icon">📞</span>
                                <span>${restaurant.telephone}</span>
                            </div>
                            ${restaurant.whatsapp ? 
                                `<div class="info-item">
                                    <span class="info-icon">💬</span>
                                    <span>${restaurant.whatsapp}</span>
                                </div>` : ''
                            }
                            ${restaurant.instagram ? 
                                `<div class="info-item">
                                    <span class="info-icon">📷</span>
                                    <span>${restaurant.instagram}</span>
                                </div>` : ''
                            }
                        </div>
                        <div class="restaurant-actions">
                            <a href="/order/?restaurant=${restaurant.id}" class="btn-primary">
                                Commander
                            </a>
                            ${restaurant.whatsapp ? 
                                `<a href="https://wa.me/${restaurant.whatsapp}" class="btn-secondary" target="_blank">
                                    WhatsApp
                                </a>` : ''
                            }
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderRestaurants(restaurantsToRender) {
            const container = document.getElementById('restaurantsList');
            const noResults = document.getElementById('noResults');
            
            if (restaurantsToRender.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            container.innerHTML = restaurantsToRender.map(restaurant => renderRestaurant(restaurant)).join('');
        }
        
        function searchRestaurants() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                renderRestaurants(restaurants);
                return;
            }
            
            const filteredRestaurants = restaurants.filter(restaurant => {
                return restaurant.nom.toLowerCase().includes(searchTerm) ||
                       restaurant.adresse.toLowerCase().includes(searchTerm) ||
                       restaurant.telephone.includes(searchTerm) ||
                       (restaurant.whatsapp && restaurant.whatsapp.includes(searchTerm)) ||
                       (restaurant.instagram && restaurant.instagram.toLowerCase().includes(searchTerm));
            });
            
            renderRestaurants(filteredRestaurants);
        }
        
        function selectRestaurant(restaurantId) {
            window.location.href = `/order/?restaurant=${restaurantId}`;
        }
        
        // Charger les restaurants depuis l'API
        async function loadRestaurants() {
            try {
                const response = await fetch('/api/restaurants/');
                const data = await response.json();
                restaurants = data;
                renderRestaurants(restaurants);
            } catch (error) {
                console.error('Erreur lors du chargement des restaurants:', error);
                document.getElementById('restaurantsList').innerHTML = 
                    '<div class="no-results"><div>❌</div><div>Erreur de chargement</div></div>';
            }
        }
        
        // Charger les restaurants au chargement de la page
        document.addEventListener('DOMContentLoaded', loadRestaurants);
    </script>
</body>
</html>
